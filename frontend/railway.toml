# Railway configuration for the VaaniAI Next.js frontend
# Docs: https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# ---------------------------------------------------------------------------
# Environment variables to set in Railway dashboard for this service:
#
#   NEXT_PUBLIC_API_URL   = https://<backend-service>.railway.app
#   NEXT_PUBLIC_WS_URL    = wss://<backend-service>.railway.app
#   PORT                  = 3000  (Railway sets this automatically)
#
# Build-time variables (needed at `npm run build`):
#   NEXT_PUBLIC_API_URL must be set before deploy so Next.js can inline it.
# ---------------------------------------------------------------------------
