version: "3.9"

services:
  # ── FastAPI Application ────────────────────────────────────────────────────
  app:
    build: .
    container_name: voice_agent_app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    networks:
      - voice_net

  # ── PostgreSQL + pgvector ──────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: voice_agent_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voice_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-voice_agent_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voice_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voice_net

  # ── Redis (cache + Celery broker) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: voice_agent_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voice_net

  # ── Celery Worker (background doc processing) ─────────────────────────────
  celery_worker:
    build: .
    container_name: voice_agent_celery
    command: celery -A app.worker worker --loglevel=info --concurrency=4
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    networks:
      - voice_net

  # ── Next.js Frontend Dashboard ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voice_agent_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://app:8000
      NEXT_PUBLIC_WS_URL: ws://app:8000
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - voice_net

volumes:
  postgres_data:
  redis_data:

networks:
  voice_net:
    driver: bridge
